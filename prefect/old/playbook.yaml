      c3-dc2:
        enabled: true
        display_name: "Client 3 — DC 2"
        inventory_sources:

          ad:
            resource_ref: ad_main
            params:
              ou_filter: "OU=DC2,OU=Servers,DC=corp,DC=client3,DC=local"

          wsus:
            tool: wsus
            block: "client3-wsus-c3-dc2"
            params:
              server_url: "http://wsus-dc2.client3.local:8530"
              target_type: server

          trellix:
            resource_ref: trellix_main
            params:
              group_filter: "Client3/DC2"

          vcenter:
            tool: vcenter
            block: "client3-vcenter-c3-dc2"    # separate vCenter per DC
            params:
